<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Applied AI</title>
  <style>
    :root {
      --bg: #0d1117;
      --fg: #e6edf3;
      --muted: #8b949e;
      --accent: #58a6ff;
      --card: #161b22;
      --border: #30363d;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      line-height: 1.6;
    }
    main {
      max-width: 720px;
      padding: 2.5rem;
      text-align: center;
    }
    h1 {
      font-size: clamp(2rem, 6vw, 3.25rem);
      margin: 0 0 .5rem;
      background: linear-gradient(90deg, var(--accent), #a371f7);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    p.lead { color: var(--muted); font-size: 1.15rem; margin: 0 0 2rem; }
    .badge {
      display: inline-block;
      padding: .25rem .75rem;
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--muted);
      font-size: .8rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 1.5rem;
      margin-top: 1.5rem;
      text-align: left;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }
    footer { margin-top: 2.5rem; color: var(--muted); font-size: .85rem; }
  </style>
</head>
<body>
  <main>
    <span class="badge">🚀 Página de prueba</span>
    <h1>Applied AI</h1>
    <p class="lead">Esta página está publicada con GitHub Pages.</p>
    <div class="card">
      <p>Si estás viendo esto, el despliegue funciona correctamente. Edita
      <code>index.html</code> en la raíz del repositorio para empezar a construir el sitio.</p>
    </div>
    <footer>
      <a href="https://github.com/ssoto/applied-ai">github.com/ssoto/applied-ai</a>
    </footer>
  </main>
</body>
</html>
