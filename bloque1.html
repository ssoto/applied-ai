<h1 id="bloque-1">Bloque 1</h1>
<h2 id="prompt-engineering">Prompt Engineering</h2>
<p>Patrones · Antipatrones · Ejercicio práctico</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="2" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="2" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="%C2%BFqu%C3%A9-es-un-prompt">¿Qué es un prompt?</h2>
<p>Un <strong>prompt</strong> es la instrucción que le das al modelo para obtener una respuesta.</p>
<p>La calidad del output depende directamente de la <strong>claridad y estructura</strong> del input.</p>
<blockquote>
<p>&quot;Garbage in, garbage out&quot; — aplica igual a los LLMs: un prompt vago produce una respuesta vaga.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="3" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="3" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="%C2%BFqu%C3%A9-hay-detr%C3%A1s-del-asistente">¿Qué hay detrás del asistente?</h2>
<p>Un <strong>LLM</strong> (Large Language Model) es un modelo estadístico entrenado para predecir la continuación más probable de un texto.</p>
<p>No &quot;entiende&quot; — <strong>completa patrones</strong> aprendidos de billones de palabras.</p>
<p>Esto explica tres cosas clave:</p>
<ul>
<li><strong>Sin memoria por defecto</strong> — cada conversación empieza desde cero</li>
<li><strong>Respuesta probable, no verdadera</strong> — el modelo elige lo más plausible, no lo correcto</li>
<li><strong>Sensible al contexto</strong> — un prompt ambiguo abre el espacio de respuestas posibles → output genérico</li>
</ul>
<blockquote>
<p>El asistente no te lee la mente. Te lee el prompt.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="4" data-paginate="true" data-class="lead" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" class="lead" data-marpit-pagination="4" style="--paginate:true;--class:lead;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="caso-pr%C3%A1ctico-nomadhub">Caso práctico: NomadHub</h2>
<p>Startup de espacios de coworking.<br />
Acaban de abrir su <strong>tercer espacio nuevo</strong>.</p>
<p>Necesitan comunicarlo.</p>
<p>Usaremos este caso en <strong>todos los ejemplos</strong> de este bloque.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="5" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="5" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="el-mismo-objetivo-dos-iteraciones">El mismo objetivo. Dos iteraciones.</h2>
<p><strong>Iteración 1</strong> — explorar rápido</p>
<pre><code>Escríbeme un email para anunciar la apertura.
</code></pre>
<p>El output llega, pero es genérico. Eso no es un fracaso: es información. ¿Qué falta?</p>
<p><strong>Iteración 2</strong> — añadir estructura <em>(lo construiremos juntos)</em></p>
<pre><code>Eres el responsable de marketing de NomadHub, una startup de
coworking para nómadas digitales. Acabamos de abrir nuestro
tercer espacio en Málaga. Redacta un email de apertura para
nuestra lista de suscriptores con asunto, cuerpo de máximo
150 palabras y CTA final. Tono cercano. Sin palabras como
&quot;innovador&quot; o &quot;disruptivo&quot;.
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="6" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="6" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patrones-de-prompt">Patrones de prompt</h2>
<p>En ingeniería del software, un <strong>patrón de diseño</strong> es una solución reutilizable a un problema recurrente — no es código concreto, es una plantilla de pensamiento.</p>
<p>Lo formalizaron Gamma, Helm, Johnson y Vlissides en <em>Design Patterns</em> (1994): Factory, Observer, Strategy...</p>
<p><strong>La misma idea aplica aquí.</strong></p>
<p>Un patrón de prompt es una estructura reutilizable que resuelve un problema recurrente al comunicarse con un LLM.</p>
<p>No es una fórmula mágica — es un punto de partida que puedes adaptar.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="7" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="7" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-0--intenci%C3%B3n-antes-que-instrucci%C3%B3n">Patrón 0 — Intención antes que instrucción</h2>
<p>Un LLM siempre genera algo. Y lo genera rápido.</p>
<p>El riesgo no es que no responda — es que respondas a la pregunta equivocada con mucho detalle.</p>
<p>Antes de abrir el chat, responde esto:</p>
<ul>
<li>¿Qué problema estoy resolviendo <strong>realmente</strong>?</li>
<li>¿Qué aspecto tiene un output que me sirva?</li>
<li>¿Necesito generarlo ahora, o necesito pensarlo primero?</li>
</ul>
<blockquote>
<p>Velocidad sin dirección es ruido. El prompt empieza antes de escribir el prompt.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="8" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="8" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-1--rol">Patrón 1 — Rol</h2>
<p>Sin rol, el modelo elige una perspectiva genérica.</p>
<pre><code>Eres el responsable de marketing de NomadHub,
una startup de coworking para nómadas digitales.
</code></pre>
<p><strong>Por qué importa:</strong> el modelo calibra vocabulario, tono y nivel de detalle según el rol que le asignas.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="9" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="9" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-2--contexto">Patrón 2 — Contexto</h2>
<p>Sin contexto, el modelo asume. Y asume mal.</p>
<pre><code>Acabamos de abrir nuestro tercer espacio en Málaga,
enfocado a nómadas digitales y equipos remotos.
</code></pre>
<p><strong>Por qué importa:</strong> el contexto elimina ambigüedad y reduce alucinaciones sobre hechos de tu negocio.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="10" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="10" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-3--tarea-espec%C3%ADfica">Patrón 3 — Tarea específica</h2>
<pre><code>Redacta un email de apertura
para nuestra lista de suscriptores.
</code></pre>
<p><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> <code>&quot;Ayúdame con el lanzamiento&quot;</code> — ¿qué canal? ¿qué acción? ¿para quién?</p>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Una tarea = una instrucción clara y acotada.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="11" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="11" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-4--formato-de-salida">Patrón 4 — Formato de salida</h2>
<p>Sin formato definido, el modelo decide por ti.</p>
<pre><code>Estructura:
- Asunto del email
- Cuerpo (máximo 150 palabras)
- CTA final con enlace
</code></pre>
<p><strong>Por qué importa:</strong> te ahorra reformatear el output y hace el resultado directamente utilizable.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="12" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="12" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-5--restricciones-expl%C3%ADcitas">Patrón 5 — Restricciones explícitas</h2>
<p>Decirle al modelo qué <strong>no</strong> quieres es tan importante como lo que sí quieres.</p>
<pre><code>Tono cercano y directo.
Evita palabras como &quot;innovador&quot;, &quot;disruptivo&quot; o &quot;ecosistema&quot;.
No uses signos de exclamación en el asunto.
</code></pre>
<p><strong>Por qué importa:</strong> sin restricciones, el modelo tiende a lo genérico y al lenguaje corporativo vacío.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="13" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="13" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="patr%C3%B3n-6--few-shot-ejemplo-de-referencia">Patrón 6 — Few-shot (ejemplo de referencia)</h2>
<p>Mostrar es más eficaz que describir.</p>
<pre><code>Aquí tienes un email anterior que funcionó bien.
Usa un tono y estructura similares:

---
Asunto: Ya estamos en Barcelona. Y tenemos mesa para ti.
Hola [nombre], el coworking que pedíais en Barcelona ya existe...
---
</code></pre>
<p><strong>Por qué importa:</strong> un ejemplo vale más que tres párrafos describiendo el estilo de marca.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="14" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="14" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="repaso--los-7-patrones">Repaso — Los 7 patrones</h2>
<table>
<thead>
<tr>
<th>#</th>
<th>Patrón</th>
<th>Clave</th>
</tr>
</thead>
<tbody>
<tr>
<td>0</td>
<td><strong>Intención</strong></td>
<td>Para. ¿Qué necesitas realmente?</td>
</tr>
<tr>
<td>1</td>
<td><strong>Rol</strong></td>
<td>Quién eres al escribir</td>
</tr>
<tr>
<td>2</td>
<td><strong>Contexto</strong></td>
<td>Qué sabe el modelo de tu negocio</td>
</tr>
<tr>
<td>3</td>
<td><strong>Tarea específica</strong></td>
<td>Qué quieres exactamente</td>
</tr>
<tr>
<td>4</td>
<td><strong>Formato de salida</strong></td>
<td>Cómo debe estructurarse la respuesta</td>
</tr>
<tr>
<td>5</td>
<td><strong>Restricciones</strong></td>
<td>Qué <strong>no</strong> quieres</td>
</tr>
<tr>
<td>6</td>
<td><strong>Few-shot</strong></td>
<td>Un ejemplo vale más que mil palabras</td>
</tr>
</tbody>
</table>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="15" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="15" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="el-prompt-completo--13">El prompt completo — 1/3</h2>
<pre><code>[Patrón 1 · Rol]
Eres el responsable de marketing de NomadHub,
una startup de coworking para nómadas digitales.

[Patrón 2 · Contexto]
Acabamos de abrir nuestro tercer espacio en Málaga.
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="16" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="16" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="el-prompt-completo--23">El prompt completo — 2/3</h2>
<pre><code>[Patrón 3 · Tarea]
Redacta un email de apertura para nuestra lista de suscriptores
con esta estructura:

[Patrón 4 · Formato]
- Asunto
- Cuerpo (máximo 150 palabras)
- CTA con enlace a la web
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="17" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="17" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="el-prompt-completo--33">El prompt completo — 3/3</h2>
<pre><code>[Patrón 5 · Restricciones]
Tono cercano y directo.
Sin palabras como &quot;innovador&quot; o &quot;disruptivo&quot;.

[Patrón 6 · Few-shot]
Aquí tienes un email anterior como referencia de tono:
&quot;Asunto: Ya estamos en Barcelona. Y tenemos mesa para ti. [...]&quot;
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="18" data-marpit-scope-CFDVxAyz="" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="18" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="chain-of-thought--cu%C3%A1ndo-usarlo">Chain-of-Thought — cuándo usarlo</h2>
<p>Cuando la tarea tiene <strong>múltiples pasos</strong> o requiere razonamiento, pide al modelo que piense antes de responder.</p>
<pre><code>Antes de redactar el email, razona:
1. ¿Qué sabe el suscriptor de NomadHub?
2. ¿Qué hace diferente el espacio de Málaga?
3. ¿Qué acción concreta queremos que tome?

Luego redacta el email.
</code></pre>
<p><strong>Resultado:</strong> el modelo explicita sus asunciones antes de escribir — más fácil de corregir si algo falla.</p>
<blockquote>
<p><strong>Con modelos razonadores</strong>, el CoT ocurre internamente de forma automática — no hace falta pedirlo. Guiar los pasos sigue siendo útil para acotar el razonamiento.</p>
</blockquote>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="19" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="19" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="antipatr%C3%B3n-1--el-prompt-ambiguo">Antipatrón 1 — El prompt ambiguo</h2>
<p>Tomamos el email generado y pedimos:</p>
<pre><code>Hazlo más atractivo.
</code></pre>
<p><img class="emoji" draggable="false" alt="❓" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2753.svg" data-marp-twemoji=""/> ¿Más atractivo para quién? ¿Más visual? ¿Más emocional? ¿Más corto?</p>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> En su lugar:</p>
<pre><code>Reescribe el asunto para aumentar la tasa de apertura.
Usa una pregunta o una afirmación inesperada. Máximo 8 palabras.
</code></pre>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section data-marpit-scope-IGOeIsHc="" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="20" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="25" data-marpit-advanced-background="background" data-marpit-advanced-background-split="left"><div data-marpit-advanced-background-container="true" data-marpit-advanced-background-direction="horizontal"><figure style="background-image:url(&quot;assets/atrfje.jpg&quot;);background-size:80%;"></figure></div></section></foreignObject><foreignObject width="50%" height="720" x="50%"><section id="20" data-marpit-scope-IGOeIsHc="" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="20" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;--marpit-advanced-background-split:50%;" data-marpit-pagination-total="25" data-marpit-advanced-background="content" data-marpit-advanced-background-split="left">
<h3 id="antipatr%C3%B3n-2---el-yes-man">Antipatrón 2 - <a href="https://www.mariiapetryk.com/blog/post-23-yes-man-and-other-people-pleasing-behavior-of-llms">El &quot;Yes-man&quot;</a></h3>

<p>El modelo por defecto completa lo que pides sin cuestionarlo.</p>
<pre><code>Redacta el email de apertura de Málaga.
</code></pre>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Añade una instrucción de crítica previa:</p>
<pre><code>Antes de redactarlo, señala cualquier información que te falte
o asunción que estés haciendo sobre NomadHub o el público objetivo.
</code></pre>
<p><strong>Resultado:</strong> el modelo te avisa antes de inventarse datos de tu negocio.</p>
<blockquote>
<p>Esta instrucción de crítica previa es un <strong>guardaraíl básico</strong>: una regla dentro del prompt que limita o valida el comportamiento del modelo antes de que genere el output.</p>
</blockquote>
</section>
</foreignObject><foreignObject width="1280" height="720" data-marpit-advanced-background="pseudo"><section data-marpit-scope-IGOeIsHc="" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="20" style="" data-marpit-pagination-total="25" data-marpit-advanced-background="pseudo" data-marpit-advanced-background-split="left"></section></foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="21" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="21" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="antipatr%C3%B3n-3--la-tarea-gigante">Antipatrón 3 — La tarea gigante</h2>
<pre><code>Crea toda la campaña de lanzamiento del espacio de coworking.
</code></pre>
<p>El modelo genera algo. Pero no es lo que necesitabas.</p>
<p><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Descompón en pasos:</p>
<pre><code>Paso 1: Email de apertura para suscriptores
Paso 2: 3 posts para LinkedIn e Instagram
Paso 3: Email de seguimiento para quienes no abrieron el primero
</code></pre>
<p>Cada paso usa el output del anterior como contexto.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="22" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="22" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="antipatr%C3%B3n-4--olvidar-el-p%C3%BAblico">Antipatrón 4 — Olvidar el público</h2>
<p>El mismo hecho. Dos audiencias. Dos prompts distintos.</p>
<pre><code>[Para usuarios finales]
Email de apertura: tono cercano, beneficios concretos,
CTA para reservar un día de prueba gratuito.

[Para inversores]
Email de apertura: enfocado en tracción, tercer espacio en 18 meses,
métricas de ocupación, próximos mercados objetivo.
</code></pre>
<p><strong>El modelo no sabe para quién escribes si no se lo dices.</strong></p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="23" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="23" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="la-plantilla">La plantilla</h2>
<pre><code>Rol:           Eres [X] con experiencia en [Y]
Contexto:      [situación actual del negocio]
Tarea:         [qué necesito exactamente]
Formato:       [estructura y extensión de la respuesta]
Restricciones: [qué no quiero / límites de tono o contenido]
Referencia:    [ejemplo de output que te gusta]
</code></pre>
<p>Guárdala. Reutilízala. Mejórala con cada uso.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="24" data-paginate="true" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" data-marpit-pagination="24" style="--paginate:true;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
<h2 id="ejercicio-pr%C3%A1ctico">Ejercicio práctico</h2>
<p><strong>Tu turno</strong> — Aplica la plantilla a un caso real de tu startup.</p>
<p>Elige una tarea concreta:</p>
<ul>
<li>Un email a clientes</li>
<li>Un post para RRSS</li>
<li>Una respuesta a una objeción de ventas</li>
<li>Una descripción de producto</li>
</ul>
<p>5 minutos para escribir el prompt → pruébalo en claude.ai → compartimos.</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="25" data-paginate="true" data-class="lead" data-lang="es" data-theme="r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c" lang="es" class="lead" data-marpit-pagination="25" style="--paginate:true;--class:lead;--lang:es;--theme:r3pcqcimm278nx062qk2iwj7kenv7sar0nlkux47pb1c;" data-marpit-pagination-total="25">
